<article>
  <h1>{{ title() }}</h1>
  <p class="text-dark-50">{{ date() }}</p>

  <!-- 行動裝置目錄 (md 以下顯示) -->
  @if (toc().length > 0) {
    <div
      class="mt-6 border border-[rgba(245,153,41,0.3)] rounded-lg overflow-hidden bg-dark-500 shadow-[0_4px_16px_rgba(0,0,0,0.3)] md:hidden"
    >
      <button
        type="button"
        class="flex items-center justify-between w-full px-4 py-[0.65rem] bg-primary-500/10 text-primary-500 font-semibold text-[0.9rem] border-0 transition-colors hover:bg-[rgba(245,153,41,0.18)]"
        (click)="tocOpen.set(!tocOpen())"
      >
        <span>目錄</span>
        <i class="toc-chevron shrink-0 fa-solid fa-angle-down" [class.open]="tocOpen()"></i>
      </button>
      <ul class="toc-list" [class.open]="tocOpen()">
        @for (item of toc(); track item; let i = $index) {
          <li
            class="toc-item border-t border-[rgba(245,153,41,0.15)]"
            [class.active]="activeHeading() === item"
          >
            <button
              type="button"
              class="toc-link flex items-start gap-[0.6rem] w-full px-3 py-[0.55rem] bg-transparent border-0 text-dark-50 text-[0.82rem] leading-[1.4] text-left cursor-pointer transition-colors hover:text-primary-500 hover:bg-[rgba(245,153,41,0.08)]"
              (click)="scrollToHeading(item)"
            >
              <span
                class="toc-index inline-flex items-center justify-center w-[1.2rem] h-[1.2rem] rounded-full bg-primary-500/20 text-primary-500 text-[0.7rem] font-semibold shrink-0 mt-[0.1rem] transition-colors"
                >{{ i + 1 }}</span
              >
              {{ item }}
            </button>
          </li>
        }
      </ul>
    </div>
  }

  <section class="mt-5">
    <md-viewer [content]="content()" />
  </section>

  <!-- 標籤 -->
  <section>
    <nav class="flex flex-wrap gap-3 mt-5">
      @for (tag of tags(); track tag.tagId) {
        <a
          class="px-3 py-1 text-sm text-dark-50 border border-dark-50 rounded-full hover:text-primary-500 hover:border-primary-500"
          [routerLink]="['/tags', tag.tagId]"
          ># {{ tag.name }}</a
        >
      }
    </nav>
  </section>
</article>

<!-- 桌機固定目錄 (視窗夠寬才顯示) -->
@if (toc().length > 0) {
  <aside class="toc-sidebar text-sm">
    <p class="toc-sidebar-title">目錄</p>
    <ul class="toc-list open">
      @for (item of toc(); track item; let i = $index) {
        <li class="toc-item" [class.active]="activeHeading() === item">
          <button type="button" class="toc-link" (click)="scrollToHeading(item)">
            <span class="toc-index">{{ i + 1 }}</span>
            {{ item }}
          </button>
        </li>
      }
    </ul>
  </aside>
}
