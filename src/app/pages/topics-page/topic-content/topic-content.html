<div class="grid grid-cols-1 md:grid-cols-12 gap-5">
  <!-- 側邊導航 spacer（維持 grid 佔位） -->
  <aside #sidebarSpacer class="hidden md:block md:col-span-3"></aside>

  <!-- Fixed 側邊導航（定位由 JS 動態計算） -->
  <div
    class="hidden md:block fixed bg-dark-400 p-4 rounded-lg overflow-y-auto sidebar-scroll"
    [style.top.px]="sidebarTop()"
    [style.left.px]="sidebarLeft()"
    [style.width.px]="sidebarWidth()"
    [style.maxHeight]="'calc(100vh - ' + sidebarTop() + 'px)'"
  >
    <nav class="flex flex-col gap-2">
      @for (nav of topicNav(); track nav.id) {
        <div>
          <h3 class="font-medium">{{ nav.name }}</h3>
          @if (nav.items) {
            <ul class="ml-4 mt-1 flex flex-col gap-1">
              @for (item of nav.items; track item.id) {
                <li>
                  <a
                    [routerLink]="item.id === 'readme' ? ['/topics', topicsId()] : ['/topics', topicsId(), item.id]"
                    class="block px-2 py-1 rounded-sm text-sm"
                    [ngClass]="item.id === (articleId() || 'readme') ? 'bg-primary-500' : 'hover:text-primary-500'"
                    >{{ item.name }}</a
                  >
                </li>
              }
            </ul>
          }
        </div>
      }
    </nav>
  </div>

  <!-- 文章內容 -->
  <section class="col-span-12 md:col-span-9">
    <app-post [post]="post()" />
    <giscus-comment />
  </section>
</div>
