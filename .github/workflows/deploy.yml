name: Deploy UI to GCP

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy-to-gcp:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Copy docker-compose.prod.yml to GCP VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/enpei.com.tw.conf"
          target: "~/angular-blog-ui/"

      - name: Setup nginx + SSL (first deploy only)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            CERT_PATH="/etc/letsencrypt/live/enpei.com.tw/fullchain.pem"

            if [ ! -f "$CERT_PATH" ]; then
              echo "=== First-time: installing nginx + certbot ==="
              sudo apt-get update -qq
              sudo apt-get install -y -qq nginx certbot python3-certbot-nginx

              sudo cp ~/angular-blog-ui/nginx/enpei.com.tw.conf \
                   /etc/nginx/sites-available/enpei.com.tw
              sudo ln -sf /etc/nginx/sites-available/enpei.com.tw \
                          /etc/nginx/sites-enabled/
              sudo nginx -t && sudo systemctl reload nginx

              sudo certbot --nginx \
                -d enpei.com.tw \
                -d www.enpei.com.tw \
                --non-interactive \
                --agree-tos \
                -m "${{ secrets.CERTBOT_EMAIL }}" \
                --redirect
              echo "=== SSL setup complete ==="
            else
              echo "=== SSL already configured, skipping ==="
            fi

      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            echo "${{ secrets.GH_CR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f ~/angular-blog-ui/docker-compose.prod.yml pull
            docker compose -f ~/angular-blog-ui/docker-compose.prod.yml up -d
            docker image prune -f
